<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SAT Makon — Farzandingiz uchun jahon universitetlariga yo'l</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
/* SAT Makon — Design System Tokens
   Colors, typography, spacing, radii, shadows
   ================================================ */


:root {
  /* ===== Brand / Primary ===== */
  --brand-primary:        #7C3AED;   /* violet 600 — main CTA, headline accent */
  --brand-primary-hover:  #6D28D9;   /* violet 700 */
  --brand-primary-press:  #5B21B6;   /* violet 800 */
  --brand-deep:           #3B1A8A;   /* logo background deep indigo */
  --brand-tint:           #EDE9FE;   /* violet 100 — pill bg */
  --brand-tint-2:         #F5F3FF;   /* violet 50 — surface tint */
  --brand-ink:            #2E1065;   /* violet 950 — pressed card text */

  /* ===== Accent (student score / highlight) ===== */
  --accent-gold:          #E5FF4E;   /* yellow-green score number on purple cards */
  --accent-gold-soft:     #F1FF88;

  /* ===== Neutrals ===== */
  --fg-1:                 #0B0B0F;   /* pure ink — headlines */
  --fg-2:                 #1F2430;   /* dark body */
  --fg-3:                 #525768;   /* muted body */
  --fg-4:                 #8A8F9C;   /* caption / label */
  --fg-5:                 #B5B9C2;   /* disabled */
  --bg-0:                 #FFFFFF;   /* page */
  --bg-1:                 #F5F5F7;   /* section bg */
  --bg-2:                 #EFEFF3;   /* card bg on tinted section */
  --bg-3:                 #E6E6EC;   /* divider bg */
  --border-1:             #E5E5EA;   /* default card border */
  --border-2:             #D6D6DC;

  /* ===== Semantic ===== */
  --success:              #16A34A;
  --danger:               #E11D48;
  --warn:                 #F59E0B;

  /* ===== Type ===== */
  --font-display: 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif;
  --font-body:    'Inter', system-ui, -apple-system, sans-serif;
  --font-mono:    ui-monospace, 'SF Mono', Menlo, monospace;

  /* Display scale — tight, bold, slightly compact */
  --fs-display-1: clamp(48px, 6.5vw, 92px);   /* hero headline */
  --fs-display-2: clamp(36px, 5vw, 64px);     /* section headline */
  --fs-display-3: clamp(28px, 3.5vw, 44px);   /* sub-headline */
  --fs-h1: 48px;
  --fs-h2: 36px;
  --fs-h3: 28px;
  --fs-h4: 22px;
  --fs-h5: 18px;
  --fs-body-lg: 18px;
  --fs-body: 16px;
  --fs-body-sm: 14px;
  --fs-caption: 12px;

  --fw-regular: 400;
  --fw-medium: 500;
  --fw-semibold: 600;
  --fw-bold: 700;
  --fw-extrabold: 800;
  --fw-black: 900;

  --lh-tight: 1.02;
  --lh-snug: 1.15;
  --lh-body: 1.55;
  --lh-loose: 1.7;

  --ls-tight: -0.03em;
  --ls-display: -0.035em;
  --ls-pill: 0.08em;

  /* ===== Spacing ===== */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-7: 32px;
  --sp-8: 40px;
  --sp-9: 56px;
  --sp-10: 72px;
  --sp-11: 96px;
  --sp-12: 128px;

  /* ===== Radii ===== */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 22px;
  --r-2xl: 28px;
  --r-pill: 999px;

  /* ===== Shadows ===== */
  --sh-card:   0 1px 2px rgba(16, 12, 34, 0.04), 0 2px 6px rgba(16, 12, 34, 0.04);
  --sh-card-2: 0 2px 4px rgba(16, 12, 34, 0.06), 0 12px 28px rgba(16, 12, 34, 0.06);
  --sh-pop:    0 10px 40px rgba(124, 58, 237, 0.18);
  --sh-ring:   0 0 0 1px rgba(124, 58, 237, 0.25), 0 12px 32px rgba(124, 58, 237, 0.18);

  /* ===== Transitions ===== */
  --t-fast: 120ms cubic-bezier(.2,.7,.3,1);
  --t-base: 200ms cubic-bezier(.2,.7,.3,1);
  --t-slow: 360ms cubic-bezier(.2,.7,.3,1);
}

/* ===== Semantic text element styles =====
   Consumers can target vars directly, or use the .ds-* utility classes below. */

.ds-display-1 {
  font-family: var(--font-display);
  font-weight: var(--fw-extrabold);
  font-size: var(--fs-display-1);
  line-height: var(--lh-tight);
  letter-spacing: var(--ls-display);
  color: var(--fg-1);
}
.ds-display-2 {
  font-family: var(--font-display);
  font-weight: var(--fw-extrabold);
  font-size: var(--fs-display-2);
  line-height: var(--lh-tight);
  letter-spacing: var(--ls-display);
  color: var(--fg-1);
}
.ds-display-3 {
  font-family: var(--font-display);
  font-weight: var(--fw-bold);
  font-size: var(--fs-display-3);
  line-height: var(--lh-snug);
  letter-spacing: var(--ls-tight);
  color: var(--fg-1);
}
.ds-h4 { font-family: var(--font-display); font-weight: 700; font-size: 22px; line-height: 1.25; color: var(--fg-1); letter-spacing: -0.015em; }
.ds-h5 { font-family: var(--font-display); font-weight: 700; font-size: 18px; line-height: 1.3;  color: var(--fg-1); letter-spacing: -0.01em; }
.ds-body { font-family: var(--font-body); font-weight: 400; font-size: 16px; line-height: 1.6; color: var(--fg-3); }
.ds-body-lg { font-family: var(--font-body); font-weight: 400; font-size: 18px; line-height: 1.6; color: var(--fg-3); }
.ds-body-sm { font-family: var(--font-body); font-weight: 400; font-size: 14px; line-height: 1.55; color: var(--fg-3); }
.ds-caption { font-family: var(--font-body); font-weight: 500; font-size: 12px; line-height: 1.4; color: var(--fg-4); }

/* Tiny uppercase pill label — section intros */
.ds-eyebrow {
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: var(--ls-pill);
  text-transform: uppercase;
  color: var(--brand-primary);
}

/* Purple accent for 2-tone headlines */
.ds-accent { color: var(--brand-primary); }

/* ===== Global resets commonly assumed ===== */
* { box-sizing: border-box; }
html, body {
  margin: 0;
  font-family: var(--font-body);
  color: var(--fg-2);
  background: var(--bg-0);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* SAT Makon — Landing Page Styles
   ================================================ */

/* ---- Page scaffold ---- */
.page { min-height: 100vh; background: #fff; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
section { padding: 96px 0; position: relative; }
section.tight { padding: 72px 0; }
section.bg-gray { background: #F5F5F7; }

/* ---- Navbar ---- */
.nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,0.85);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.nav-inner {
  display: flex; align-items: center; gap: 40px;
  padding: 14px 24px; max-width: 1200px; margin: 0 auto;
}
.brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.brand img { height: 28px; width: auto; }
.brand-wm { font-family: var(--font-display); font-weight: 700; font-size: 16px; letter-spacing: -0.02em; color: #0B0B0F; }
.brand-wm .a { color: #7C3AED; }

.nav-links { display: flex; gap: 28px; margin-left: 8px; }
.nav-links a { color: #3A3A42; font-size: 14px; font-weight: 500; text-decoration: none; transition: color .15s; letter-spacing: -0.005em; }
.nav-links a:hover { color: #0B0B0F; }
.spacer { flex: 1; }

.lang { display: flex; align-items: center; gap: 2px; }
.lang button { background: none; border: 0; padding: 4px 8px; font-size: 13px; font-weight: 500; color: #8A8F9C; cursor: pointer; font-family: inherit; letter-spacing: -0.005em; border-radius: 6px; transition: color .15s; }
.lang button.on { color: #0B0B0F; font-weight: 600; }
.lang .sep { color: #D6D6DC; font-weight: 300; font-size: 13px; }

.nav-cta { background: #7C3AED; color: #fff; border: 0; padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; letter-spacing: -0.005em; transition: background .15s; }
.nav-cta:hover { background: #6D28D9; }

.nav-mobile-toggle { display: none; }

/* ---- Shared ---- */
.eyebrow-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px; border-radius: 999px;
  background: rgba(255,255,255,0.6);
  border: 1px solid rgba(11,11,15,0.10);
  color: #3C3F4A;
  font-family: var(--font-display);
  font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
  backdrop-filter: saturate(140%) blur(6px);
  -webkit-backdrop-filter: saturate(140%) blur(6px);
}
.eyebrow-pill::before { content: none; }
.h-display {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(40px, 5.5vw, 76px);
  line-height: 1.02; letter-spacing: -0.035em; color: #0B0B0F;
  margin: 0;
}
.h-display .a { color: #7C3AED; display: block; }
.h-section {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(32px, 4vw, 52px);
  line-height: 1.05; letter-spacing: -0.03em; color: #0B0B0F;
  margin: 0;
}
.h-section .a { color: #7C3AED; display: block; }
.h-section.inline .a { display: inline; }
.sub {
  font-size: 18px; line-height: 1.55; color: #525768; max-width: 620px;
}

/* ---- Buttons ---- */
.btn { border: 0; cursor: pointer; font-family: var(--font-body); font-weight: 600; border-radius: 999px; padding: 14px 24px; font-size: 15px; transition: background .15s, transform .15s, border-color .15s; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
.btn-primary { background: #7C3AED; color: #fff; }
.btn-primary:hover { background: #6D28D9; }
.btn-secondary { background: #fff; color: #0B0B0F; border: 1px solid #E5E5EA; }
.btn-secondary:hover { border-color: #7C3AED; color: #7C3AED; }
.btn-dark { background: #0B0B0F; color: #fff; }
.btn-dark:hover { background: #1F2430; }

/* ---- Hero ---- */
.hero { padding: 80px 0 64px; }
.hero .cta-row { display: flex; gap: 14px; margin-top: 32px; flex-wrap: wrap; }
.social-row { display: flex; align-items: center; gap: 14px; margin-top: 28px; font-size: 13px; color: #525768; flex-wrap: wrap; }
.avatars { display: flex; }
.avatars .a { width: 32px; height: 32px; border-radius: 999px; border: 2px solid #fff; background: linear-gradient(135deg,#A78BFA,#7C3AED); margin-left: -8px; }
.avatars .a:first-child { margin-left: 0; }
.avatars .more { background: #7C3AED; color: #fff; font-size: 10px; font-weight: 700; display: grid; place-items: center; }

.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px;
  padding-top: 48px; margin-top: 48px;
  border-top: 1px solid rgba(0,0,0,0.06);
}
.stat-num { font-family: var(--font-display); font-weight: 800; font-size: clamp(32px, 3.2vw, 44px); color: #7C3AED; letter-spacing: -0.03em; line-height: 1; }
.stat-lbl { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #8A8F9C; margin-top: 10px; font-weight: 600; }

/* ---- Explainer (SAT / AP) ---- */
.explainer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 56px; align-items: stretch; }

/* Scroll-triggered pop-in */
.pop-in.pop-in {
  opacity: 0;
  transform: translateY(28px) scale(0.94);
  transition:
    opacity .32s cubic-bezier(.2,.7,.2,1) var(--pop-delay, 0ms),
    transform .42s cubic-bezier(.34,1.7,.5,1) var(--pop-delay, 0ms),
    border-color .15s;
  will-change: opacity, transform;
}
.pop-in.pop-in.is-in {
  opacity: 1;
  transform: translateY(0) scale(1);
}
@media (prefers-reduced-motion: reduce) {
  .pop-in.pop-in { opacity: 1; transform: none; transition: none; }
}
.explain-cards { display: flex; flex-direction: column; gap: 14px; }
.explain-card {
  background: #fff; border: 1px solid #E5E5EA; border-radius: 16px;
  padding: 24px 26px;
  flex: 1;
  display: flex; flex-direction: column; justify-content: center;
  transition: border-color .15s, transform .15s;
}
.explain-card:hover { border-color: #C4B5FD; }
.explain-card h4 { font-family: var(--font-display); font-weight: 700; font-size: 17px; color: #0B0B0F; margin: 0 0 6px; letter-spacing: -0.015em; }
.explain-card p { font-size: 14px; line-height: 1.6; color: #525768; margin: 0; }

.benefits-card {
  background: linear-gradient(155deg, #8B5CF6 0%, #6D28D9 100%);
  color: #fff; border-radius: 22px; padding: 26px 28px; box-shadow: 0 20px 60px rgba(124,58,237,0.25);
  position: relative; overflow: hidden;
  display: flex; flex-direction: column; justify-content: space-between; gap: 18px;
}
.benefits-card ul { flex: 0 0 auto; }
.benefits-card .benefits-cta {
  align-self: flex-start;
  display: inline-flex; align-items: center; gap: 10px;
  color: #6D28D9; background: #fff;
  text-decoration: none; font-weight: 700; font-size: 14px;
  letter-spacing: 0.01em;
  padding: 12px 20px;
  border-radius: 999px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  position: relative; z-index: 1;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  margin-top: 0;
}
.benefits-card .benefits-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 12px 28px rgba(0,0,0,0.22);
}
.benefits-card .benefits-cta span { transition: transform 0.2s ease; display: inline-block; }
.benefits-card .benefits-cta:hover span { transform: translateX(4px); }
.benefits-card::after {
  content: ""; position: absolute; top: -40%; right: -20%; width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 60%);
  pointer-events: none;
}
.benefits-card h3 { font-family: var(--font-display); font-weight: 800; font-size: 22px; letter-spacing: -0.02em; margin: 0 0 14px; }
.benefits-card ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; position: relative; z-index: 1; }
.benefits-card li { display: flex; gap: 10px; align-items: flex-start; font-size: 13.5px; line-height: 1.5; }
.benefits-card .check { flex: 0 0 20px; width: 20px; height: 20px; border-radius: 999px; background: rgba(255,255,255,0.2); display: grid; place-items: center; font-size: 11px; font-weight: 800; margin-top: 2px; }

/* AP 3-column */
.three-col { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-top: 56px; }
.info-card {
  background: #fff; border: 1px solid #E5E5EA; border-radius: 20px;
  padding: 36px 32px;
  min-height: 280px;
  display: flex; flex-direction: column; gap: 16px;
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}
.info-card:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(17,17,20,0.06); border-color: #d6d6dd; }
.info-card .num { font-family: var(--font-display); font-weight: 800; font-size: 14px; color: #7C3AED; letter-spacing: 0.08em; margin-bottom: 4px; }
.info-card h4 { font-family: var(--font-display); font-weight: 700; font-size: 20px; letter-spacing: -0.01em; margin: 0; color: #0B0B0F; line-height: 1.25; }
.info-card p { font-size: 15px; line-height: 1.6; color: #525768; margin: 0; }

/* ---- Guarantee ---- */
.guarantee-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 40px; }
.guard-purple {
  background: linear-gradient(155deg,#8B5CF6 0%, #5B21B6 100%);
  color: #fff; border-radius: 22px; padding: 32px;
  position: relative; overflow: hidden; min-height: 260px;
}
.guard-purple .eyebrow { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.85; font-weight: 700; }
.guard-purple h3 { font-family: var(--font-display); font-weight: 800; font-size: 32px; line-height: 1.05; letter-spacing: -0.025em; margin: 12px 0 14px; white-space: pre-line; }
.guard-purple p { font-size: 14px; line-height: 1.6; opacity: 0.92; max-width: 85%; margin: 0; position: relative; z-index: 1; }
.guard-purple .ghost-num { position: absolute; right: -24px; bottom: -50px; font-family: var(--font-display); font-weight: 900; font-size: 220px; opacity: 0.13; line-height: 1; letter-spacing: -0.05em; }

.guard-gray {
  background: #F5F5F7; border-radius: 22px; padding: 32px; min-height: 260px;
}
.guard-gray .eyebrow { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #8A8F9C; font-weight: 700; }
.guard-gray h3 { font-family: var(--font-display); font-weight: 800; font-size: 32px; line-height: 1.05; letter-spacing: -0.025em; color: #0B0B0F; margin: 12px 0 28px; white-space: pre-line; }
.guard-gray .mini-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.guard-gray .ms-num { font-family: var(--font-display); font-weight: 800; font-size: 36px; color: #7C3AED; letter-spacing: -0.03em; line-height: 1; }
.guard-gray .ms-lbl { font-size: 12px; color: #8A8F9C; margin-top: 6px; }

.feature-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-top: 16px; }
.feature-card { background: #fff; border: 1px solid #E5E5EA; border-radius: 16px; padding: 22px; }
.feature-card.gray { background: #F5F5F7; border: 0; }
.feature-card .icon { width: 38px; height: 38px; border-radius: 10px; background: #EDE9FE; color: #7C3AED; display: grid; place-items: center; font-size: 18px; margin-bottom: 16px; }
.feature-card h4 { font-family: var(--font-display); font-weight: 700; font-size: 16px; color: #0B0B0F; margin: 0 0 6px; letter-spacing: -0.01em; }
.feature-card p { font-size: 13px; line-height: 1.55; color: #525768; margin: 0; }

/* ---- Meet Kam ---- */
.kam-grid { display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 48px; align-items: center; }
.kam-photo {
  width: 100%; aspect-ratio: 4/5; border-radius: 20px;
  background: linear-gradient(180deg, #E5E7EB, #9CA3AF);
  display: grid; place-items: center; font-size: 120px; color: rgba(0,0,0,0.35);
}
.kam-body { font-size: 16px; line-height: 1.7; color: #525768; margin-top: 20px; }
.kam-body .hl { color: #7C3AED; font-weight: 600; }
.kam-quote { background: #F5F5F7; border-radius: 16px; padding: 22px 24px; margin-top: 24px; }
.kam-quote .q { font-style: italic; font-family: var(--font-display); font-weight: 600; font-size: 16px; line-height: 1.55; color: #1F2430; }
.kam-quote .who { margin-top: 14px; display: flex; align-items: center; gap: 10px; }
.kam-quote .who .avatar { width: 32px; height: 32px; border-radius: 999px; background: #D6D6DC; }
.kam-quote .who .name { font-weight: 700; font-size: 13px; color: #0B0B0F; }
.kam-quote .who .sub { font-size: 12px; color: #8A8F9C; }

/* ---- Makon.ai ---- */
.makonai-grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 48px; align-items: center; }
.makonai-feats { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px; margin: 28px 0 32px; }
.makonai-feat { display: flex; gap: 10px; align-items: flex-start; }
.makonai-feat .check { flex: 0 0 20px; width: 20px; height: 20px; border-radius: 999px; background: #EDE9FE; color: #7C3AED; display: grid; place-items: center; font-size: 11px; font-weight: 800; margin-top: 2px; }
.makonai-feat span { font-size: 14px; color: #1F2430; line-height: 1.4; }

.makonai-preview {
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(124,58,237,0.25), 0 0 0 1px rgba(17,17,20,0.06);
  background: #fff;
}
.makonai-preview img { display: block; width: 100%; height: auto; }
.makonai-sidebar { width: 30%; background: rgba(255,255,255,0.12); border-radius: 12px; padding: 14px 10px; display: flex; flex-direction: column; gap: 6px; }
.makonai-sidebar .logo { color: #fff; font-weight: 700; font-size: 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.makonai-sidebar .item { color: rgba(255,255,255,0.85); font-size: 11px; padding: 6px 8px; border-radius: 6px; }
.makonai-sidebar .item.active { background: rgba(255,255,255,0.2); color: #fff; font-weight: 600; }
.makonai-main { flex: 1; background: #fff; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.makonai-main .stat-card { background: #F5F3FF; border-radius: 8px; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; }
.makonai-main .stat-card .big { font-family: var(--font-display); font-weight: 800; font-size: 22px; color: #7C3AED; }
.makonai-main .stat-card .lbl { font-size: 10px; color: #525768; }
.mini-radar { background: #F5F5F7; border-radius: 8px; aspect-ratio: 2/1; display: grid; place-items: center; color: #7C3AED; font-size: 10px; font-weight: 600; }
.mini-streak { background: #FFF7ED; border-radius: 8px; padding: 8px 10px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #B45309; font-weight: 600; }

/* ---- Students ---- */
.students-scroll { margin-top: 48px; }
.students-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
.student-card {
  position: relative; aspect-ratio: 0.72;
  border-radius: 18px; overflow: hidden;
  background: linear-gradient(180deg, #7C3AED 0%, #5B21B6 100%);
  color: #fff; padding: 16px;
  display: flex; flex-direction: column; justify-content: flex-end;
  box-shadow: 0 12px 30px rgba(124,58,237,0.2);
}
.student-card .sc-logo { position: absolute; top: 14px; left: 14px; font-family: var(--font-display); font-weight: 800; font-size: 10px; line-height: 1.05; letter-spacing: 0.02em; color: #fff; z-index: 2; display: flex; align-items: center; gap: 6px; }
.student-card .sc-logo img { height: 22px; width: auto; }
.student-card .paper { position: absolute; top: 40px; right: -12px; width: 110px; height: 150px; background: #fff; border-radius: 4px; transform: rotate(8deg); opacity: 0.92; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
.student-card .paper::before, .student-card .paper::after { content: ""; position: absolute; left: 10px; right: 10px; height: 3px; background: #E5E7EB; border-radius: 2px; }
.student-card .paper::before { top: 16px; }
.student-card .paper::after { top: 26px; right: 40px; }
.student-card .photo {
  position: absolute; top: 44px; right: 14px; width: 92px; height: 108px; border-radius: 8px;
  background: linear-gradient(180deg, #4C1D95 0%, #1E0B5A 100%);
  display: grid; place-items: center; font-size: 40px;
  z-index: 1;
}
.student-card .flame { position: absolute; right: 20px; bottom: 90px; font-size: 24px; z-index: 2; }
.student-card .score { font-family: var(--font-display); font-weight: 900; font-size: 52px; color: #E5FF4E; letter-spacing: -0.04em; line-height: 1; text-shadow: 2px 3px 0 rgba(0,0,0,0.15); position: relative; z-index: 2; }
.student-card .name { font-weight: 700; font-size: 13px; margin-top: 4px; position: relative; z-index: 2; }
.student-card .tag { font-size: 10px; font-style: italic; opacity: 0.9; margin-top: 2px; position: relative; z-index: 2; }

/* ---- Social proof bar ---- */
.social-bar {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 24px; padding: 28px 0;
  border-top: 1px solid rgba(0,0,0,0.08); border-bottom: 1px solid rgba(0,0,0,0.08);
  align-items: center;
}
.social-bar-item { text-align: center; font-size: 14px; color: #525768; font-weight: 500; }
.social-bar-item strong { display: block; font-family: var(--font-display); font-weight: 800; font-size: 26px; color: #0B0B0F; letter-spacing: -0.02em; margin-bottom: 2px; }

/* ---- Testimonials ---- */
.testimonial-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 48px; }
.testi {
  background: #fff; border: 1px solid #E5E5EA; border-radius: 18px; padding: 26px;
  display: flex; flex-direction: column;
}
.testi .q { font-size: 15px; line-height: 1.6; color: #1F2430; margin: 0 0 20px; flex: 1; }
.testi .who { display: flex; align-items: center; gap: 12px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 16px; }
.testi .avatar { width: 36px; height: 36px; border-radius: 999px; background: linear-gradient(135deg, #EDE9FE, #A78BFA); display: grid; place-items: center; font-weight: 700; color: #6D28D9; font-size: 13px; }
.testi .name { font-weight: 700; font-size: 14px; color: #0B0B0F; }
.testi .sub { font-size: 12px; color: #7C3AED; font-weight: 600; }

/* ---- University logos ---- */
.uni-logos { display: flex; align-items: center; justify-content: space-around; gap: 40px; flex-wrap: wrap; margin-top: 32px; opacity: 0.5; filter: grayscale(100%); }
.uni-logos .uni { font-family: 'Times New Roman', serif; font-weight: 700; font-size: 18px; color: #0B0B0F; letter-spacing: 0.02em; }
.uni-label { text-align: center; font-size: 13px; color: #8A8F9C; margin-top: 32px; font-weight: 500; }

/* ---- Path to College ---- */
.path-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-top: 56px; position: relative; }
.path-card { background: #fff; border: 1px solid #E5E5EA; border-radius: 16px; padding: 24px 20px; text-align: center; position: relative; }
.path-card.highlight { background: #7C3AED; border-color: #7C3AED; color: #fff; box-shadow: 0 20px 40px rgba(124,58,237,0.25); }
.path-number {
  position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
  width: 36px; height: 36px; border-radius: 999px; background: #fff; border: 2px solid #E5E5EA;
  display: grid; place-items: center; font-family: var(--font-display); font-weight: 700; font-size: 13px; color: #525768;
}
.path-card.highlight .path-number { background: #5B21B6; border-color: #5B21B6; color: #fff; }
.path-card h4 { font-family: var(--font-display); font-weight: 700; font-size: 20px; margin: 18px 0 8px; letter-spacing: -0.02em; color: #0B0B0F; }
.path-card.highlight h4 { color: #fff; }
.path-card .sub { font-size: 13px; font-weight: 600; color: #7C3AED; margin-bottom: 12px; }
.path-card.highlight .sub { color: #E5FF4E; }
.path-card p { font-size: 13px; line-height: 1.55; color: #525768; margin: 0; }
.path-card.highlight p { color: rgba(255,255,255,0.9); }

/* ---- Pricing ---- */
.pricing-note { text-align: center; font-size: 14px; color: #8A8F9C; margin: 16px auto 0; max-width: 600px; }
.pricing-subhead { font-family: var(--font-display); font-weight: 700; font-size: 22px; color: #0B0B0F; letter-spacing: -0.02em; margin: 56px 0 20px; text-align: center; }
.pricing-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; align-items: stretch; }
.price-card {
  background: #F5F5F7; border-radius: 18px; padding: 28px 24px;
  display: flex; flex-direction: column; position: relative; transition: transform .2s;
  border: 2px solid transparent;
}
.price-card.recommended {
  background: #fff; border: 2px solid #7C3AED;
  box-shadow: 0 20px 60px rgba(124,58,237,0.18);
  transform: scale(1.02);
}
.price-card.popular { background: #0B0B0F; color: #fff; }
.price-card.popular .p-name, .price-card.popular .p-price, .price-card.popular .p-feat span { color: #fff; }
.price-card.popular .p-dur { color: rgba(255,255,255,0.6); }
.price-card.popular .p-price .per { color: rgba(255,255,255,0.6); }

.price-badge {
  position: absolute; top: -13px; left: 50%; transform: translateX(-50%);
  padding: 5px 14px; border-radius: 999px;
  font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
  white-space: nowrap;
}
.price-badge.rec { background: #7C3AED; color: #fff; }
.price-badge.pop { background: #E5FF4E; color: #3B1A8A; }
.p-name { font-family: var(--font-display); font-weight: 700; font-size: 20px; color: #0B0B0F; letter-spacing: -0.02em; }
.p-subname { font-size: 13px; color: #8A8F9C; font-weight: 500; margin-top: 2px; }
.p-price { font-family: var(--font-display); font-weight: 900; font-size: 48px; color: #0B0B0F; letter-spacing: -0.04em; line-height: 1; margin-top: 18px; }
.p-price .per { font-size: 14px; font-weight: 700; color: #525768; }
.p-dur { font-size: 13px; color: #8A8F9C; margin-top: 4px; font-weight: 500; }
.p-feats { list-style: none; padding: 0; margin: 22px 0 22px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
.p-feat { display: flex; gap: 10px; align-items: flex-start; font-size: 13px; line-height: 1.4; }
.p-feat.no { color: #B5B9C2; }
.p-feat .mark { flex: 0 0 18px; width: 18px; height: 18px; border-radius: 999px; display: grid; place-items: center; font-size: 10px; font-weight: 800; margin-top: 1px; background: #EDE9FE; color: #7C3AED; }
.p-feat.no .mark { background: #F5F5F7; color: #B5B9C2; }
.price-card.recommended .p-feat .mark { background: #EDE9FE; color: #7C3AED; }
.price-card.popular .p-feat .mark { background: rgba(229,255,78,0.2); color: #E5FF4E; }
.price-card.popular .p-feat.no .mark { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.3); }
.price-card.popular .p-feat.no span { color: rgba(255,255,255,0.4); }

.p-cta { width: 100%; padding: 13px; border-radius: 999px; border: 0; cursor: pointer; font-family: var(--font-body); font-weight: 700; font-size: 14px; background: #0B0B0F; color: #fff; transition: background .15s; }
.p-cta:hover { background: #1F2430; }
.price-card.recommended .p-cta { background: #7C3AED; }
.price-card.recommended .p-cta:hover { background: #6D28D9; }
.price-card.popular .p-cta { background: #E5FF4E; color: #3B1A8A; }
.price-card.popular .p-cta:hover { background: #F1FF88; }

.pricing-foot { text-align: center; font-size: 12px; color: #8A8F9C; margin-top: 32px; }

/* ---- FAQ ---- */
.faq-list { max-width: 820px; margin: 48px auto 0; display: flex; flex-direction: column; gap: 0; border-top: 1px solid rgba(0,0,0,0.08); }
.faq-item { border-bottom: 1px solid rgba(0,0,0,0.08); }
.faq-q { width: 100%; background: transparent; border: 0; padding: 22px 0; text-align: left; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-family: var(--font-display); font-weight: 600; font-size: 17px; color: #0B0B0F; letter-spacing: -0.015em; }
.faq-q .caret { width: 24px; height: 24px; border-radius: 999px; background: #F5F5F7; display: grid; place-items: center; color: #525768; font-size: 14px; transition: transform .2s; flex: none; }
.faq-item.open .caret { transform: rotate(45deg); background: #7C3AED; color: #fff; }
.faq-a { max-height: 0; overflow: hidden; transition: max-height .3s, padding .3s; font-size: 15px; line-height: 1.65; color: #525768; }
.faq-item.open .faq-a { max-height: 300px; padding: 0 0 22px; }

/* ---- Final CTA ---- */
.final-cta { background: linear-gradient(155deg, #8B5CF6 0%, #5B21B6 100%); color: #fff; text-align: center; border-radius: 32px; padding: 72px 24px; position: relative; overflow: hidden; }
.final-cta::before { content: ""; position: absolute; inset: 0; background: radial-gradient(ellipse at top, rgba(255,255,255,0.2), transparent 60%); pointer-events: none; }
.final-cta h2 { font-family: var(--font-display); font-weight: 800; font-size: clamp(36px, 5vw, 60px); line-height: 1.02; letter-spacing: -0.035em; margin: 0 0 16px; position: relative; }
.final-cta h2 .a { display: block; color: #E5FF4E; }
.final-cta p { font-size: 17px; line-height: 1.55; opacity: 0.92; max-width: 520px; margin: 0 auto 32px; position: relative; }
.final-cta .btn { background: #fff; color: #0B0B0F; padding: 18px 32px; font-size: 16px; font-weight: 700; position: relative; }
.final-cta .btn:hover { transform: translateY(-2px); }
.final-cta .small { font-size: 13px; opacity: 0.85; margin-top: 20px; position: relative; }

/* ---- Footer ---- */
.footer { padding: 48px 0 40px; border-top: 1px solid rgba(0,0,0,0.06); }
.footer-row { display: flex; justify-content: space-between; align-items: center; gap: 24px; flex-wrap: wrap; }
.footer-links { display: flex; gap: 24px; flex-wrap: wrap; }
.footer-links a { color: #525768; font-size: 13px; text-decoration: none; }
.footer-links a:hover { color: #7C3AED; }
.footer-rights { color: #8A8F9C; font-size: 13px; }
.footer-social { display: flex; gap: 10px; }
.footer-social a { width: 34px; height: 34px; border-radius: 999px; background: #F5F5F7; display: grid; place-items: center; color: #525768; font-size: 14px; text-decoration: none; transition: background .15s, color .15s; }
.footer-social a:hover { background: #7C3AED; color: #fff; }

/* ---- Responsive ---- */
@media (max-width: 880px) {
  section { padding: 64px 0; }
  .nav-links { display: none; }
  .explainer-grid, .kam-grid, .makonai-grid { grid-template-columns: 1fr; gap: 28px; }
  .three-col, .feature-grid, .stats-row, .guarantee-grid, .path-grid, .pricing-grid, .testimonial-grid, .social-bar { grid-template-columns: 1fr 1fr; }
  .feature-grid, .stats-row { gap: 20px 16px; }
  .pricing-grid { grid-template-columns: 1fr; }
  .price-card.recommended { transform: none; }
  .makonai-feats { grid-template-columns: 1fr; }
  .students-grid { grid-template-columns: 1fr 1fr; }
  .final-cta { border-radius: 20px; padding: 48px 20px; }
}
@media (max-width: 560px) {
  .stats-row, .social-bar, .three-col, .feature-grid, .guarantee-grid, .path-grid, .testimonial-grid { grid-template-columns: 1fr; }
  .nav-inner { gap: 12px; padding: 12px 16px; }
  .lang { display: none; }
  .brand-wm { font-size: 14px; }
  .hero { padding: 48px 0 40px; }
}

  </style>
